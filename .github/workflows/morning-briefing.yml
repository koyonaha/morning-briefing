name: Morning Briefing (6 AM JST)

on:
  schedule:
    - cron: '0 21 * * *'  # 朝6時 JST (UTC 21:00)

concurrency:
  group: morning-briefing
  cancel-in-progress: true

jobs:
  send-morning-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning briefing script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TZ: Asia/Tokyo
          BRIEFING_TYPE: morning
          ADDITIONAL_CALENDAR_IDS: "lqcha5ku1d6c6bsmmgsr3o9v58@group.calendar.google.com,dff14455f73afce7d65ee119456e1221709e76d4e193a3366982dcc3dd8de49f@group.calendar.google.com,l5aovm4lltlkspos4d2l3dk404@group.calendar.google.com,7de3375d912de8021a1f8949fc1c5e1bedbdeaa1278890ae7846c16386b8e123@group.calendar.google.com,b8ull37c87km0vpbelhhlt513c@group.calendar.google.com"
        run: python morning_briefing.py
