name: Morning Briefing

on:
  schedule:
      - cron: '0 21 * * *'  # 朝6時 JST
          - cron: '0 3 * * *'   # 昼12時 JST
            workflow_dispatch:
            
            jobs:
              briefing:
                  runs-on: ubuntu-latest
                      
                          steps:
                                - uses: actions/checkout@v3
                                      
                                            - name: Set up Python
                                                    uses: actions/setup-python@v4
                                                            with:
                                                                      python-version: '3.11'
                                                                            
                                                                                  - name: Install dependencies
                                                                                          run: |
                                                                                                    python -m pip install --upgrade pip
                                                                                                              pip install -r requirements.txt
                                                                                                                    
                                                                                                                          - name: Run briefing
                                                                                                                                  env:
                                                                                                                                            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                                                                                                                                                      TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
                                                                                                                                                                GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
                                                                                                                                                                        run: python morning_briefing.pyname: Morning Briefing

on:
  schedule:
      - cron: '0 21 * * *'  # 毎日21:00 UTC (翌日6:00 JST)
        workflow_dispatch:

        jobs:
          morning-briefing:
              runs-on: ubuntu-latest

                      steps:
                            - uses: actions/checkout@v3

                                        - name: Set up Python
                                                uses: actions/setup-python@v4
                                                        with:
                                                                  python-version: '3.11'

                                                                              - name: Install dependencies
                                                                                      run: |
                                                                                                python -m pip install --upgrade pip
                                                                                                          pip install -r requirements.txt
                                                                                                                
                                                                                                                      - name: Run morning briefing
                                                                                                                              env:
                                                                                                                                        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                                                                                                                                                  TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
                                                                                                                                                            GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
                                                                                                                                                                    run: python morning_briefing.py
